<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseAI – Advanced Health Diagnostics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Background Elements -->
        <div class="bg-glow"></div>
        <div class="grid-overlay"></div>

        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 12H18L15 21L9 3L6 12H2" stroke="#00E5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Pulse<span class="highlight">AI</span> v4.0</span>
            </div>
            <div class="status-badge">
                <span class="dot"></span> Online
            </div>
        </header>

        <main class="main">
            <div class="info-section">
                <h1>Smart Blood Pressure Check</h1>
                <p>Advanced optical-touch sensor technology calibrated for precision.</p>
            </div>

            <!-- SCANNER AREA -->
            <div class="scanner-container" id="scanner-area">
                <div class="scanner-ring">
                    <div class="ring-fill" id="progress-ring"></div>
                    <div class="sensor-surface">
                        <div class="fingerprint-icon">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 11c0-1.657-1.343-3-3-3s-3 1.343-3 3 1.343 3 3 3 3-1.343 3-3z"/>
                                <path d="M12 21c4.97 0 9-4.03 9-9s-4.03-9-9-9-9 4.03-9 9 4.03 9 9 9z"/>
                                <path d="M15.5 11c0-1.657-1.343-4.5-3.5-4.5s-4.5 2.843-4.5 4.5"/>
                                <path d="M14.5 15.5c-.828 0-1.5-.672-1.5-1.5s-.672-1.5-1.5-1.5"/>
                                <path d="M12 18v-1"/>
                                <path d="M12 7V6"/>
                                <path d="M17 12h1"/>
                                <path d="M6 12h1"/>
                            </svg>
                        </div>
                        <div class="scan-line"></div>
                    </div>
                </div>

                <div class="scan-instructions" id="instruction-text">
                    PLACE THUMB HERE TO START
                </div>

                <div class="progress-details" id="progress-data" style="opacity: 0;">
                    <div class="data-item">
                        <span class="label">SYSTOLIC</span>
                        <span class="value" id="systolic-val">---</span>
                    </div>
                    <div class="data-divider"></div>
                    <div class="data-item">
                        <span class="label">DIASTOLIC</span>
                        <span class="value" id="diastolic-val">---</span>
                    </div>
                    <div class="data-divider"></div>
                    <div class="data-item">
                        <span class="label">BPM</span>
                        <span class="value" id="bpm-val">---</span>
                    </div>
                </div>
            </div>

            <!-- FOOTER INFO -->
            <div class="disclaimer">
                <i class="icon-info"></i> Medical-grade sensors active. Maintain steady posture.
            </div>
        </main>

        <!-- HIDDEN OVERLAY FOR VIDEO -->
        <div class="video-overlay" id="video-overlay">
            <div class="overlay-content">
                <div class="close-btn" id="close-video">×</div>
                <div class="video-wrapper">
                    <!-- High-performance local video player -->
                    <video id="prank-video" 
                           width="100%" height="100%" 
                           playsinline 
                           preload="auto"
                           style="width:100%; height:100%; object-fit: contain; background: #000;">
                        <source src="/prank_video.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
